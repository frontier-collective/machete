name: CI

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

jobs:
  cli:
    name: Test Suite - CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  app-typecheck:
    name: App typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: cd app && npm ci

      - name: Typecheck
        run: cd app && npx tsc --noEmit

  app-build:
    name: App build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
            artifact: "app/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg"

          # macOS Intel (cross-compiled on ARM runner)
          - os: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg
            artifact: "app/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg"

          # Linux x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
            artifact: |
              app/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              app/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage

          # Linux ARM
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            bundles: deb,appimage
            artifact: |
              app/src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb
              app/src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage/*.AppImage

          # Windows x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis,msi
            artifact: |
              app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
              app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi

          # Windows ARM
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            bundles: nsis
            artifact: |
              app/src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      # Linux: install system dependencies for Tauri + WebKitGTK
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install dependencies
        run: |
          npm ci
          cd app && npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: app
          tauriScript: npm run tauri
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: machete-${{ matrix.target }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
